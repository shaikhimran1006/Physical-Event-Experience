name: quality-checks

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt

      - name: Run backend tests with coverage gate
        run: pytest

  dashboard-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Lint dashboard
        run: npm run lint

      - name: Test dashboard
        run: npm run test

  fan-app-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fan-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fan-app/package-lock.json

      - name: Install fan app dependencies
        run: npm ci

      - name: Lint fan app
        run: npm run lint

      - name: Test fan app
        run: npm run test
