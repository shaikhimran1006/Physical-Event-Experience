[pytest]
testpaths = backend/tests
python_files = test_*.py
addopts = -q --cov=backend/app --cov-report=term-missing --cov-fail-under=90
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:.*python_multipart.*:PendingDeprecationWarning
    ignore:.*on_event is deprecated, use lifespan event handlers instead\..*:DeprecationWarning
    ignore:The configuration option "asyncio_default_fixture_loop_scope" is unset\..*:pytest.PytestDeprecationWarning
